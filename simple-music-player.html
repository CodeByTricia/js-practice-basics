<!DOCTYPE html>
<html>
<head>
    <title>Simple Music Player</title>
</head>
<body>

    <h1>Simple Music Player</h1>

    <input type="file" id="songInput" multiple accept="audio/*">

    <ul id="songList"></ul>
    <hr>
    <h2>Now Playing:</h2>
    <p id="currentSong">No song selected</p>

    <!-- Audio player -->
    <audio id="audioPlayer" controls></audio>
    <script>

        const songInput = document.getElementById("songInput");
        const songList = document.getElementById("songList");
        const audioPlayer = document.getElementById("audioPlayer");
        const currentSong = document.getElementById("currentSong");

        let songs = [];

        songInput.addEventListener("change", function () {

            // Add new uploaded songs to existing array
            songs.push(...Array.from(songInput.files));

            // Get starting index of new songs
            let startIndex = songs.length - songInput.files.length;

            // Loop only through newly uploaded songs
            for (let i = startIndex; i < songs.length; i++) {

                const listItem = document.createElement("li");

                listItem.textContent = songs[i].name;

                listItem.addEventListener("click", function () {

                    const songURL = URL.createObjectURL(songs[i]);

                    audioPlayer.src = songURL;

                    audioPlayer.play();

                    currentSong.textContent = songs[i].name;
                });

                songList.appendChild(listItem);
            }

        });

    </script>

</body>
</html>
