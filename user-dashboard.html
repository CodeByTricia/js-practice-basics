<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User dashboard</title>
</head>
<body>
  <h1>Welcome to user dashboard!</h1>
  <button id="logoutBtn">Log Out</button>
  <script>

    // check if logged in and throws user into appropriate page if they try to bypass admin user dashboard
    const currentUser = JSON.parse(localStorage.getItem("currentUser"));

    if(!currentUser){
      window.location.href = "index.html";
    }else if(currentUser.role !== "user"){
      window.location.hred = "admin.html";
    }

    // removes localStorage to logout
    document.getElementById("logoutBtn").addEventListener("click", () => {
      localStorage.removeItem("currentUser");
      window.location.href = "index.html";
    });

    // throws user/admin to login page if they already logged out and they try to go back into the dashboard
    window.addEventListener("pageshow", () => {
      const user = JSON.parse(localStorage.getItem("currentUser"));

      if(!user){
        window.location.href = "index.html"
      }
    });
  </script>
</body>
</html>
