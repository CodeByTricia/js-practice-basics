<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    label {
      display: block;
      margin: 10px 0;
    }

    .container {
      padding: 50px;
      
    }

    button {
      display: block;
      margin-top: 20px;
      padding: 10px 78px;
    }

    input {
      padding: 10px;
    }

  </style>
</head>
<body>
  <div class="container">
    <h1>LOG IN</h1>
    <label for="username">Username</label>
    <input type="text" id="username" required>
    <label for="password">Password</label>
    <input type="password" id="password" required>
    <button id="loginBtn">Log In</button>
  </div>
<script src="script.js"></script>
</body>
</html>
