<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To Do List</title>
  <style>
    body{
      font-family: monospace;
    }

    h1{
      text-align: center;
      font-size: 2.5rem;
    }

    input {
      padding: 10px;
    }

    button{
      padding: 0 30px 0 30px;
    }

    .box{
      display: flex;
      column-gap: 10px;
      margin: 0 auto;
      padding: 0;
      justify-content: center;
    }
    
    hr{
      margin: 30px 0 10px 0;
    }

    ul{
      list-style-type: none;
      padding: 10px;
      width: 30%;

    }

    li {
      margin-bottom: 10px;
      background-color: lightblue;
      border-radius: 10px;
      padding: 5px;
    }

    .list-box{
      display: flex;
      margin: 0 auto;
      padding: 0;
      justify-content: center;
    }

  </style>
</head>
<body>
  <h1>Simple To-Do List</h1>
  <div class="box">
    <input type="Text" id="inputText">
    <button id="addBtn">Add</button>
  </div>
  <hr>
  <div class="list-box">
    <ul>
    </ul>
  </div>
  <script src="todoList.js"></script>
</body>
</html>
