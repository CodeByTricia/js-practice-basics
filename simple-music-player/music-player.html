<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player</title>
  <link rel="stylesheet" href="music-player.css">
</head>
<body>
  <!--HEADER -->
  <section class="header-box">
    <h1>simpleMusicPlayer()</h1>
  </section>
  <!-- UPLOAD -->
  <section class="upload-box">
    <p>Upload your songs</p>
    <input type="file" id="songInput" multiple accept="audio/*">
  </section>
  <section class="list-player-box">
    <!-- SONG LIST -->
    <div class="song-list-box">
      <p>Song List</p>
      <div>
        <ul id="songList"></ul>
      </div>
    </div>
    <!-- SONG PLAYER -->
    <div class="music-player-box">
      <p id="currentSong">No song selected</p>
      <audio id="audioPlayer" controls></audio>
    </div>
  </section>
  <script src="musicPlayer.js"></script>
</body>
</html>
