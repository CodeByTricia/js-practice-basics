<!DOCTYPE html>
<html>
<head>
    <title>Input to Table</title>
</head>
<body>

    <h2>Add Text to Table</h2>

    <!-- Text Input -->
    <input type="text" id="userInput" placeholder="Enter text">

    <!-- Button -->
    <button onclick="addToTable()">Add</button>

    <br><br>

    <!-- Table -->
    <table border="1">
        <tr>
            <th>Text</th>
        </tr>

        <tbody id="tableBody">
            <!-- New rows will appear here -->
        </tbody>
    </table>

    <script>

        function addToTable() {

            // Get the input element
            let input = document.getElementById("userInput");

            // Get the text inside the input
            let inputText = input.value;

            // Get the table body
            let tableBody = document.getElementById("tableBody");

            // Create a new table row
            let newRow = document.createElement("tr");

            // Create a table cell
            let newCell = document.createElement("td");

            // Put the input text inside the cell
            newCell.textContent = inputText;

            // Put the cell inside the row
            newRow.appendChild(newCell);

            // Put the row inside the table
            tableBody.appendChild(newRow);

            // Clear the input field
            input.value = "";
        }

    </script>

</body>
</html>
