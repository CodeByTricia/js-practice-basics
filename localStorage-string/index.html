<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LocalStorage Practice</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
      height: 100vh;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Hello, what's your name?</h1>
  <input type="text" id="noteInput" placeholder="Type your name...">
  <button id="saveBtn">Save</button>
  <p id="text"></p>
  <script>

    const saveBtn = document.getElementById("saveBtn");
    const noteInput = document.getElementById("noteInput");
    const text = document.getElementById("text");

    text.innerHTML = "Hello, " + localStorage.getItem("textinput") + "!";

    saveBtn.addEventListener("click", function() {
      localStorage.setItem("textinput", noteInput.value);
      text.innerHTML = "Hello, " + localStorage.getItem("textinput") + "!";
      noteInput.value = "";
    });

  </script>
</div>
</body>
</html>
